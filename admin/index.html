<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", (user) => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });

    // Gestion automatique de l'invitation
    const url = new URL(window.location.href);
    const inviteToken = url.hash.match(/invite_token=([^&]+)/);
    if (inviteToken && inviteToken[1]) {
      window.netlifyIdentity.acceptInvite({ invite_token: inviteToken[1] })
        .then(() => window.netlifyIdentity.open())
        .catch((err) => console.error("Erreur d’invitation :", err));
    }
  }
</script>
